<div class="content">
    <div class="shadow-sm px-5 py-3 shadow-lg">
        <h5 class="mb-0 fw-semibold">Thêm Sản Phẩm Mới</h5>
    </div>

    <div class="px-5">
        <form class="row my-5" enctype="multipart/form-data">

            <!-- ===== ẢNH TRÁI ===== -->
            <div class="col-md-3 mb-4 text-center">
                <label class="form-label d-block">Ảnh</label>
                <!-- preview -->
                <div id="image-preview"></div>
                <input type="file"
                       class="form-control mb-3"
                       id="images"
                       multiple
                       file-model="images">
            </div>

            <!-- ===== FORM PHẢI ===== -->
            <div class="col-md-9">
                <div class="row">

                    <!-- NAME -->
                    <div class="col-12 col-md-6 mb-4">
                        <label for="name">Tên Sản Phẩm</label>
                        <input type="text"
                               class="form-control"
                               id="name"
                               ng-model="name">
                    </div>

                    <!-- CATEGORY -->
                    <div class="col-12 col-md-6 mb-4">
                        <label for="category">Loại Sản Phẩm</label>
                        <select id="category"
                                class="form-select"
                                ng-model="category">
                            <option value="">Chọn Loại Sản Phẩm</option>
                            <option ng-repeat="category in categories"
                                    value="{{ category._id }}">
                                {{ category.title }}
                            </option>
                        </select>
                    </div>

                    <!-- PRICE -->
                    <div class="col-12 col-md-6 mb-4">
                        <label for="price">Giá</label>
                        <input type="number"
                               class="form-control"
                               id="price"
                               ng-model="price">
                    </div>

                    <!-- SALE -->
                    <div class="col-12 col-md-6 mb-4">
                        <label for="sale">Giảm Giá</label>
                        <input type="number"
                               class="form-control"
                               id="sale"
                               ng-model="sale">
                    </div>

                    <!-- FLASH SALE -->
                    <div class="col-12 col-md-6 mb-4">
                        <label class="form-label">Tuỳ Chọn Sản Phẩm</label>
                        <select class="form-select"
                                ng-model="isFlashSale">
                            <option value="">Chọn</option>
                            <option value="false">Mặc Định</option>
                            <option value="true">Flash Sale</option>
                        </select>
                    </div>

                </div>
            </div>

            <!-- ===== VARIANTS FULL WIDTH ===== -->
            <div class="col-12">
                <div class="row" ng-repeat="variant in variants">
                    <div class="col-4 mb-4">
                        <label>Màu Sắc</label>
                        <input type="text"
                               class="form-control"
                               ng-model="variant.color">
                    </div>

                    <div class="col-4 mb-4">
                        <label>Kích Thước</label>
                        <input type="text"
                               class="form-control"
                               ng-model="variant.size">
                    </div>

                    <div class="col-4 mb-4">
                        <label>Số Lượng</label>
                        <input type="number"
                               class="form-control"
                               ng-model="variant.quantity">
                    </div>
                </div>
            </div>

            <!-- ADD VARIANT -->
            <div class="col-12 mb-4">
                <button type="button"
                        class="btn btn-danger"
                        ng-click="addVariant()">
                    Thêm <i class="fas fa-plus"></i>
                </button>
            </div>

            <!-- DESCRIPTION -->
            <div class="col-12 mb-4">
                <label for="description">Mô Tả</label>
                <textarea id="description"
                          ng-model="description"
                          rows="4"
                          class="form-control"></textarea>
            </div>

            <!-- SUBMIT -->
            <div class="col-12 mb-4">
                <button type="button"
                        class="btn btn-danger"
                        ng-click="addProduct()">
                    Thêm Sản Phẩm
                </button>
            </div>

        </form>
    </div>
</div>
