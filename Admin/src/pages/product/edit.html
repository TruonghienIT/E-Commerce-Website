<div class="content" ng-init="loadProductDetail()">
    <div class="shadow-sm px-5 py-3 shadow-lg">
        <h5 class="mb-0 fw-semibold">Chỉnh Sửa Sản Phẩm</h5>
    </div>

    <div class="px-5">
        <form class="row my-5" ng-submit="updateProduct()">

            <!-- ===== ẢNH TRÁI ===== -->
            <div class="col-md-3 mb-4 text-center">
                <label class="form-label d-block">Ảnh</label>

                <img ng-if="editingProduct.images.length"
                     ng-src="{{ editingProduct.images[0] }}"
                     class="img-fluid rounded"
                     style="max-height:180px; object-fit:contain;">
            </div>

            <!-- ===== FORM PHẢI ===== -->
            <div class="col-md-9">
                <div class="row">

                    <!-- NAME -->
                    <div class="col-12 col-md-6 mb-4">
                        <label>Tên Sản Phẩm</label>
                        <input type="text"
                               class="form-control"
                               ng-model="editingProduct.title">
                    </div>

                    <!-- CATEGORY -->
                    <div class="col-12 col-md-6 mb-4">
                        <label>Loại Sản Phẩm</label>
                        <select class="form-select"
                                ng-model="editingProduct.category"
                                ng-options="c._id as c.title for c in categories">
                            <option value="">Chọn Loại Sản Phẩm</option>
                        </select>
                    </div>

                    <!-- PRICE -->
                    <div class="col-12 col-md-6 mb-4">
                        <label>Giá</label>
                        <input type="number"
                               class="form-control"
                               ng-model="editingProduct.price">
                    </div>

                    <!-- SALE -->
                    <div class="col-12 col-md-6 mb-4">
                        <label>Giảm Giá</label>
                        <input type="number"
                               class="form-control"
                               ng-model="editingProduct.sale">
                    </div>

                    <!-- FLASH SALE -->
                    <div class="col-12 col-md-6 mb-4">
                        <label>Tuỳ Chọn</label>
                        <select class="form-select"
                                ng-model="editingProduct.isFlashSale"
                                ng-options="v as (v ? 'Flash Sale' : 'Mặc định') for v in [false,true]">
                        </select>
                    </div>

                </div>
            </div>

            <!-- ===== VARIANTS ===== -->
            <div class="col-12">
                <div class="row"
                     ng-repeat="variant in editingProduct.variants track by $index">

                    <div class="col-4 mb-4">
                        <label>Màu Sắc</label>
                        <input type="text"
                               class="form-control"
                               ng-model="variant.color">
                    </div>

                    <div class="col-4 mb-4">
                        <label>Kích Thước</label>
                        <input type="text"
                               class="form-control"
                               ng-model="variant.size">
                    </div>

                    <div class="col-4 mb-4">
                        <label>Số Lượng</label>
                        <input type="number"
                               class="form-control"
                               ng-model="variant.quantity">
                    </div>
                </div>
            </div>

            <!-- ADD VARIANT -->
            <div class="col-12 mb-4">
                <button type="button"
                        class="btn btn-danger"
                        ng-click="addVariantEdit()">
                    Thêm +
                </button>
            </div>

            <!-- DESCRIPTION -->
            <div class="col-12 mb-4">
                <label>Mô Tả</label>
                <textarea ng-model="editingProduct.description"
                          rows="4"
                          class="form-control"></textarea>
            </div>

            <!-- SUBMIT -->
            <div class="col-12 mb-4">
                <button type="submit" class="btn btn-danger">
                    Cập Nhật Sản Phẩm
                </button>
            </div>

        </form>
    </div>
</div>
